<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FONT Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Style -->
    <link rel="stylesheet" href="style.css" />

    <!-- FAVICON -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <title>Social Profile</title>

</head>

<body>
    <header></header>

    <main class="container__main">

        <section class="card__social__profile">
            
            <div class="profile">
                <div class="profile__avatar">
                    <img src="./assets/images/avatar-jessica.jpeg" alt="Avatar Jessica" class="avatar"/>
                </div>
                <div class="profile__dados">
                    <h1 class="profile__dados__name">Jessica Randall</h1>
                    <p class="profile__dados__address">London, United Kingdom</p>
                    <p class="profile__dados__description">"Front-end developer and avid reader."</p>
                </div>
            </div>

            <div class="redes__sociais__links">
                <a class="link" id="github" href="#" target="_blank">GitHub</a>
                <a class="link" id="fontendMentor" href="#" target="_blank">Frontend Mentor</a>
                <a class="link" id="linkedin" href="#" target="_blank">LinkedIn</a>
                <a class="link" id="twitter" href="#" target="_blank">Twitter</a>
                <a class="link" id="instagram" href="#" target="_blank">Instagram</a>
            </div>

        </section>

    </main>

     <footer class="footer__attribution">
        <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.Coded by <a href="https://www.linkedin.com/in/shillu%C3%AA/" target="_blank">Shilluê</a>.</p>
    </footer>
</body>

</html>
